<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RoArm Control Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e7ecf3;
      --muted: #9aa7b8;
      --accent: #3d8bfd;
      --ok: #3dd68c;
      --border: #2a3648;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #1a2740 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 20, 25, 0.85);
      backdrop-filter: blur(8px);
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    #mode-badge {
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: rgba(61, 214, 140, 0.15);
      color: var(--ok);
      border: 1px solid rgba(61, 214, 140, 0.35);
    }
    #mode-badge.hardware {
      background: rgba(61, 139, 253, 0.15);
      color: var(--accent);
      border-color: rgba(61, 139, 253, 0.35);
    }
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      padding: 1.25rem 1.5rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; }
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
    }
    .panel h2 {
      margin: 0 0 1rem;
      font-size: 1rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .joint-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .joint-row label {
      width: 5.5rem;
      font-size: 0.95rem;
    }
    .joint-row .angle {
      flex: 1;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      font-size: 0.9rem;
    }
    button {
      font: inherit;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #243044;
      color: var(--text);
      border-radius: 8px;
      padding: 0.4rem 0.85rem;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    button:hover {
      background: #2d3c55;
      border-color: var(--accent);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .actions button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    #roarm-3d-container {
      width: 100%;
      height: 360px;
      border-radius: 8px;
      overflow: hidden;
      background: #0a0e14;
      border: 1px solid var(--border);
    }
    #arm-feedback {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #0a0e14;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.8rem;
      color: var(--muted);
      max-height: 160px;
      overflow: auto;
      white-space: pre-wrap;
    }
    footer {
      text-align: center;
      padding: 0 1.5rem 1.5rem;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>RoArm Control Demo</h1>
    <span id="mode-badge">Simulation Mode</span>
  </header>

  <main>
    <section class="panel">
      <h2>Joint Controls</h2>
      <div class="joint-row">
        <label>Base</label>
        <button type="button" onclick="adjustJoint(0, -0.05)">−</button>
        <button type="button" onclick="adjustJoint(0, 0.05)">+</button>
        <span class="angle" id="angle-0">0.00 rad</span>
      </div>
      <div class="joint-row">
        <label>Shoulder</label>
        <button type="button" onclick="adjustJoint(1, -0.05)">−</button>
        <button type="button" onclick="adjustJoint(1, 0.05)">+</button>
        <span class="angle" id="angle-1">0.00 rad</span>
      </div>
      <div class="joint-row">
        <label>Elbow</label>
        <button type="button" onclick="adjustJoint(2, -0.05)">−</button>
        <button type="button" onclick="adjustJoint(2, 0.05)">+</button>
        <span class="angle" id="angle-2">1.57 rad</span>
      </div>
      <div class="joint-row">
        <label>Hand</label>
        <button type="button" onclick="adjustJoint(3, -0.05)">−</button>
        <button type="button" onclick="adjustJoint(3, 0.05)">+</button>
        <span class="angle" id="angle-3">3.14 rad</span>
      </div>

      <div class="actions">
        <button type="button" class="primary" onclick="resetArm()">Reset</button>
        <button type="button" onclick="getFeedback()">Feedback</button>
        <button type="button" onclick="toggleLed()">LED</button>
      </div>
      <pre id="arm-feedback">Ready.</pre>
    </section>

    <section class="panel">
      <h2>3D Visualization</h2>
      <div id="roarm-3d-container"></div>
    </section>
  </main>

  <footer>
    Portfolio demonstration — Simulation Mode requires no physical robot.
  </footer>

  <script src="web_page.js"></script>
</body>
</html>
